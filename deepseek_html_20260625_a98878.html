let currentIndex = 0;
let selectedAnswers = Array(questions.length).fill(null);
let wrongIndices = [];

function render(){
  let q = questions[currentIndex];
  let progress = ((currentIndex + 1) / questions.length) * 100;
  let hasAnswered = selectedAnswers[currentIndex] !== null;
  let userChoice = selectedAnswers[currentIndex];

  let optionsHtml = q.a.map((option, idx) => {
    let btnClass = "";
    if (hasAnswered) {
      if (idx === q.c) {
        btnClass = "show-correct";
      } else if (idx === userChoice && userChoice !== q.c) {
        btnClass = "wrong-highlight";
      }
    }
    return `<button class="option ${btnClass}" onclick="pick(${idx})">${option}</button>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="top">
      <span>السؤال ${currentIndex + 1}/${questions.length}</span>
    </div>
    <div class="bar"><div class="fill" style="width:${progress}%"></div></div>
    <h2>${q.q}</h2>
    ${optionsHtml}
    <div class="controls">
      <button class="nav" onclick="prev()">السابق</button>
      <button class="nav" onclick="next()" ${selectedAnswers[currentIndex] === null ? 'disabled' : ''}>التالي</button>
    </div>
    <div class="footer">
      <div class="copyright">© محمد البلاطي - جميع الحقوق محفوظة</div>
      <a href="https://wa.me/963984039525" target="_blank" class="whatsapp-btn">للتواصل واتساب</a>
    </div>
  `;
}

function pick(answerIndex){
  if(selectedAnswers[currentIndex] !== null) return;
  selectedAnswers[currentIndex] = answerIndex;
  render();
}

function next(){
  if(selectedAnswers[currentIndex] === null) return;
  if(currentIndex < questions.length - 1){
    currentIndex++;
    render();
  } else {
    finish();
  }
}

function prev(){
  if(currentIndex > 0){
    currentIndex--;
    render();
  }
}

function finish(){
  let correctCount = 0;
  wrongIndices = [];
  questions.forEach((q, idx) => {
    if(selectedAnswers[idx] === q.c) correctCount++;
    else wrongIndices.push(idx);
  });
  let score = Math.round((correctCount / questions.length) * 100);
  let message = score >= 50 ? "أحسنت! اجتياز موفق" : "راجع المواد جيداً وحاول مرة أخرى";

  document.getElementById("app").innerHTML = `
    <h2>${message}</h2>
    <p>الاجابات الصحيحة: ${correctCount}</p>
    <p>الاجابات الخاطئة: ${questions.length - correctCount}</p>
    <h2>العلامة: ${score}/100</h2>
    <div class="controls">
      <button class="nav" onclick="review()">مراجعة الأخطاء</button>
      <button class="nav" onclick="location.reload()">إعادة الاختبار</button>
    </div>
    <div class="footer">
      <div class="copyright">© محمد البلاطي - جميع الحقوق محفوظة</div>
      <a href="https://wa.me/963984039525" target="_blank" class="whatsapp-btn">للتواصل واتساب</a>
    </div>
  `;
}

function review(){
  let html = `<h2>مراجعة الأخطاء</h2>`;
  if(wrongIndices.length === 0){
    html += `<p>لا توجد أخطاء، كل الإجابات صحيحة.</p>`;
  } else {
    wrongIndices.forEach(idx => {
      let q = questions[idx];
      let correctAns = q.a[q.c];
      let userChoice = selectedAnswers[idx] !== null ? q.a[selectedAnswers[idx]] : "لم يجب";
      html += `
        <div class="review-box">
          <b>${q.q}</b><br>
          <span style="color:#7ed6b0">الإجابة الصحيحة: ${correctAns}</span><br>
          <span style="color:#ff9f8f">إجابتك: ${userChoice}</span>
        </div>
      `;
    });
  }
  html += `<button class="nav" onclick="location.reload()">العودة للاختبار</button>
    <div class="footer">
      <div class="copyright">© محمد البلاطي - جميع الحقوق محفوظة</div>
      <a href="https://wa.me/963984039525" target="_blank" class="whatsapp-btn">للتواصل واتساب</a>
    </div>`;
  document.getElementById("app").innerHTML = html;
}
